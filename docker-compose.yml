# docker-compose.yml
version: '3.9'

services:
  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photobooth_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://photobooth:${DB_PASSWORD}@db:5432/photobooth_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-south-1
      - S3_BUCKET_NAME=photobooth-media
      - CDN_BASE_URL=${CDN_BASE_URL}
      - DEBUG=false
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./firebase-credentials.json:/app/firebase-credentials.json
    networks:
      - photobooth_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: photobooth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: photobooth_db
      POSTGRES_USER: photobooth
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - photobooth_network

  # Redis (Caching + WebSocket + Rate Limiting)
  redis:
    image: redis:7-alpine
    container_name: photobooth_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - photobooth_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: photobooth_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - api
    networks:
      - photobooth_network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: photobooth_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@photobooth.app --agree-tos --no-eff-email -d api.photobooth.app

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

networks:
  photobooth_network:
    driver: bridge

---
# backend/Dockerfile
FROM python:3.11-slim

WORKDIR /app

# System dependencies
RUN apt-get update && apt-get install -y \
    gcc \
    libpq-dev \
    libmagic1 \
    && rm -rf /var/lib/apt/lists/*

# Python dependencies
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt

# App code
COPY . .

# Run with Gunicorn + Uvicorn
CMD ["gunicorn", "app.main:app", \
     "-w", "4", \
     "-k", "uvicorn.workers.UvicornWorker", \
     "--bind", "0.0.0.0:8000", \
     "--timeout", "120", \
     "--keepalive", "5", \
     "--access-logfile", "-"]
