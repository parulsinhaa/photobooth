name: photobooth
description: Photo Booth - Snapchat-level camera, social and print platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # Camera & Media
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  video_player: ^2.8.2
  photo_manager: ^3.0.0
  image: ^4.1.3
  image_cropper: ^5.0.1
  record: ^5.0.4
  just_audio: ^0.9.36

  # Image Processing & Filters (GPU-based)
  flutter_gl: ^0.0.8
  three_dart: ^0.0.15
  shader_mask: ^0.1.0
  screenshot: ^2.1.0
  flutter_colorpicker: ^1.0.3

  # Networking
  dio: ^5.4.1
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2
  internet_connection_checker: ^1.0.0+1
  http: ^1.2.0
  http_parser: ^4.0.2

  # Firebase
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  firebase_storage: ^11.6.5
  firebase_messaging: ^14.7.17
  cloud_firestore: ^4.15.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.2

  # Payments
  razorpay_flutter: ^1.3.6
  upi_india: ^3.0.0
  pay: ^2.0.0  # Google Pay / Apple Pay

  # UI & Animations
  lottie: ^3.0.0
  rive: ^0.12.4
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  liquid_swipe: ^3.1.0
  particles_flutter: ^0.1.4
  confetti: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  extended_image: ^8.2.0
  photo_view: ^0.14.0
  pinch_zoom: ^1.0.0

  # Fonts & Text
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Contacts & Social
  contacts_service: ^0.6.3
  permission_handler: ^11.2.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.4
  social_share: ^2.3.1

  # Utilities
  intl: ^0.19.0
  currency_formatter: ^2.1.1
  phone_numbers_parser: ^8.1.3
  country_code_picker: ^3.0.0
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1
  uuid: ^4.3.3
  crypto: ^3.0.3
  encrypt: ^5.0.3
  dart_jsonwebtoken: ^2.11.0
  path_provider: ^2.1.2
  path: ^1.9.0
  file_picker: ^8.0.0
  open_file: ^3.3.2
  archive: ^3.4.10
  mime: ^1.0.5
  collection: ^1.18.0
  rxdart: ^0.27.7
  stream_transform: ^2.1.0
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.2.0
  timeago: ^3.6.1
  flutter_rating_bar: ^4.0.1
  dots_indicator: ^3.0.0
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.67.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4
  printing: ^5.12.0
  pdf: ^3.10.8
  geolocator: ^10.1.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  bloc_test: ^9.1.6
  mocktail: ^1.0.2
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/stickers/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#F8BBD0"
    theme_color: "#F48FB1"

flutter_native_splash:
  color: "#0D0D0D"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: true
