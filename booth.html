<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapStrip – Booth 📸</title>
<link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --pink:#FF6BB5; --purple:#A855F7; --yellow:#FFD93D; --cyan:#22D3EE; --bg:#0F0B1E; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:#fff; min-height:100dvh; overflow:hidden; display:flex; flex-direction:column; }
  body::before { content:''; position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 60% 50% at 20% 20%,rgba(168,85,247,0.2) 0%,transparent 60%), radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,107,181,0.15) 0%,transparent 60%); pointer-events:none; }

  /* TOPBAR */
  .topbar { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:16px 20px; }
  .logo { font-family:'Paytone One',sans-serif; font-size:20px; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .back-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:#fff; padding:8px 16px; border-radius:100px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; backdrop-filter:blur(10px); }

  /* CAMERA AREA */
  .camera-wrap { position:relative; flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #video { width:100%; height:100%; object-fit:cover; display:block; background:#000; }
  #video.mirror { transform: scaleX(-1); }
  .camera-overlay { position:absolute; inset:0; pointer-events:none; }
  /* Corner brackets */
  .corner { position:absolute; width:32px; height:32px; border-color:rgba(255,255,255,0.6); border-style:solid; }
  .corner.tl { top:16px; left:16px; border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
  .corner.tr { top:16px; right:16px; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
  .corner.bl { bottom:80px; left:16px; border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
  .corner.br { bottom:80px; right:16px; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }

  /* FILTER PREVIEW on video */
  #video.filter-bw { filter:grayscale(1); }
  #video.filter-retro { filter:sepia(0.7) contrast(1.1) brightness(0.95); }
  #video.filter-warm { filter:sepia(0.3) saturate(1.5) brightness(1.05) hue-rotate(-10deg); }
  #video.filter-cool { filter:saturate(0.8) hue-rotate(30deg) brightness(1.05); }
  #video.filter-kawaii { filter:brightness(1.1) saturate(1.4) contrast(0.9) hue-rotate(-15deg); }
  #video.filter-neon { filter:saturate(2) contrast(1.3) brightness(0.9) hue-rotate(20deg); }
  #video.filter-dreamy { filter:brightness(1.15) blur(0.5px) saturate(1.2) contrast(0.9); }
  #video.filter-fade { filter:contrast(0.85) brightness(1.1) saturate(0.7); }
  #video.filter-lomo { filter:contrast(1.4) saturate(1.3) brightness(0.9) hue-rotate(10deg); }
  #video.filter-golden { filter:sepia(0.5) saturate(1.8) brightness(1.1) hue-rotate(-20deg); }
  #video.filter-matrix { filter:grayscale(1) sepia(1) hue-rotate(90deg) saturate(3) brightness(0.9); }
  #video.filter-pop { filter:saturate(2.5) contrast(1.2) brightness(1.05); }

  /* COUNTDOWN */
  #countdown {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.3); z-index:20; font-family:'Paytone One',sans-serif;
    font-size:120px; color:#fff; text-shadow:0 0 40px rgba(255,107,181,0.8);
    animation:count-pop 0.8s ease;
  }
  @keyframes count-pop { from { transform:scale(2); opacity:0; } to { transform:scale(1); opacity:1; } }

  /* FLASH */
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:30; transition:opacity 0.1s; }

  /* BOTTOM CONTROLS */
  .controls { position:relative; z-index:10; padding:16px 20px 28px; background:rgba(15,11,30,0.9); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.08); }

  /* FILTER SCROLL */
  .filter-strip { display:flex; gap:10px; overflow-x:auto; padding-bottom:12px; scrollbar-width:none; -ms-overflow-style:none; }
  .filter-strip::-webkit-scrollbar { display:none; }
  .filter-btn {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
    transition:transform 0.15s;
  }
  .filter-btn:active { transform:scale(0.9); }
  .filter-thumb {
    width:52px; height:52px; border-radius:14px; border:2.5px solid transparent;
    background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:border-color 0.15s, transform 0.15s;
    overflow:hidden; position:relative;
  }
  .filter-btn.active .filter-thumb { border-color:var(--pink); transform:scale(1.1); }
  .filter-label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.6); white-space:nowrap; }
  .filter-btn.active .filter-label { color:var(--pink); }

  /* CAPTURE ROW */
  .capture-row { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
  .side-btn { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; transition:transform 0.15s, background 0.15s; }
  .side-btn:active { transform:scale(0.88); background:rgba(255,255,255,0.18); }

  .capture-btn {
    width:76px; height:76px; border-radius:50%; cursor:pointer; border:none;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    box-shadow:0 0 0 6px rgba(255,107,181,0.2), 0 8px 24px rgba(168,85,247,0.4);
    display:flex; align-items:center; justify-content:center; font-size:28px;
    transition:transform 0.15s, box-shadow 0.15s;
    animation:capture-pulse 2s ease-in-out infinite;
  }
  @keyframes capture-pulse { 0%,100% { box-shadow:0 0 0 6px rgba(255,107,181,0.2); } 50% { box-shadow:0 0 0 12px rgba(255,107,181,0.1), 0 0 0 6px rgba(255,107,181,0.2); } }
  .capture-btn:active { transform:scale(0.9); }

  /* UPLOAD INPUT */
  #upload-input { display:none; }

  /* SEQUENCE INDICATOR */
  .seq-indicator { display:flex; gap:6px; justify-content:center; margin-bottom:10px; }
  .seq-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); transition:background 0.3s, transform 0.3s; }
  .seq-dot.done { background:var(--pink); transform:scale(1.2); }
  .seq-dot.current { background:var(--yellow); animation:blink 0.6s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .seq-label { text-align:center; font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:8px; font-weight:700; }

  /* No camera fallback */
  .no-cam { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:rgba(0,0,0,0.8); z-index:5; text-align:center; padding:20px; }
  .no-cam h3 { font-size:18px; font-weight:800; }
  .upload-big-btn { background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; border:none; padding:14px 28px; border-radius:100px; font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; cursor:pointer; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="logo">SnapStrip</div>
  <button class="side-btn" id="flip-btn" title="Flip camera">🔄</button>
</div>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted class="mirror"></video>
  <div class="camera-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div id="countdown"></div>
  <div id="flash"></div>

  <div class="no-cam" id="no-cam" style="display:none;">
    <div style="font-size:48px;">📷</div>
    <h3>Camera Not Available</h3>
    <p style="color:rgba(255,255,255,0.5);font-size:14px;">Upload photos from your gallery to create your strip</p>
    <button class="upload-big-btn" onclick="document.getElementById('upload-input').click()">📁 Upload Photos</button>
  </div>
</div>

<div class="controls">
  <div class="seq-label" id="seq-label">Take 4 photos for your strip</div>
  <div class="seq-indicator" id="seq-indicator">
    <div class="seq-dot current" id="dot-0"></div>
    <div class="seq-dot" id="dot-1"></div>
    <div class="seq-dot" id="dot-2"></div>
    <div class="seq-dot" id="dot-3"></div>
  </div>

  <div class="filter-strip" id="filter-strip"></div>

  <div class="capture-row">
    <button class="side-btn" id="random-btn" title="Random filter">🎲</button>
    <button class="capture-btn" id="capture-btn">📸</button>
    <button class="side-btn" id="upload-btn" title="Upload">📁</button>
  </div>
</div>

<input type="file" id="upload-input" accept="image/*" multiple>
<canvas id="canvas" style="display:none;"></canvas>

<script>
// ---- FILTERS CONFIG ----
const FILTERS = [
  { id:'none',    label:'Original', emoji:'✨', css:'' },
  { id:'kawaii',  label:'Kawaii',   emoji:'🌸', css:'brightness(1.1) saturate(1.4) contrast(0.9) hue-rotate(-15deg)' },
  { id:'retro',   label:'Retro',    emoji:'📼', css:'sepia(0.7) contrast(1.1) brightness(0.95)' },
  { id:'bw',      label:'B&W',      emoji:'🖤', css:'grayscale(1)' },
  { id:'dreamy',  label:'Dreamy',   emoji:'💜', css:'brightness(1.15) saturate(1.2) contrast(0.9)' },
  { id:'neon',    label:'Neon',     emoji:'⚡', css:'saturate(2) contrast(1.3) brightness(0.9) hue-rotate(20deg)' },
  { id:'warm',    label:'Warm',     emoji:'🍂', css:'sepia(0.3) saturate(1.5) brightness(1.05) hue-rotate(-10deg)' },
  { id:'cool',    label:'Cool',     emoji:'❄️', css:'saturate(0.8) hue-rotate(30deg) brightness(1.05)' },
  { id:'lomo',    label:'Lomo',     emoji:'📸', css:'contrast(1.4) saturate(1.3) brightness(0.9) hue-rotate(10deg)' },
  { id:'golden',  label:'Golden',   emoji:'✨', css:'sepia(0.5) saturate(1.8) brightness(1.1) hue-rotate(-20deg)' },
  { id:'matrix',  label:'Matrix',   emoji:'💚', css:'grayscale(1) sepia(1) hue-rotate(90deg) saturate(3) brightness(0.9)' },
  { id:'pop',     label:'Pop',      emoji:'🎨', css:'saturate(2.5) contrast(1.2) brightness(1.05)' },
];

let stream = null;
let facingMode = 'user';
let currentFilter = 'none';
let capturedPhotos = []; // array of {dataUrl, filter}
let currentShot = 0;
const MAX_SHOTS = 4;
let isCounting = false;

// ---- BUILD FILTER STRIP ----
const filterStrip = document.getElementById('filter-strip');
FILTERS.forEach(f => {
  const btn = document.createElement('div');
  btn.className = 'filter-btn' + (f.id === 'none' ? ' active' : '');
  btn.dataset.id = f.id;
  btn.innerHTML = `
    <div class="filter-thumb">${f.emoji}</div>
    <div class="filter-label">${f.label}</div>
  `;
  btn.addEventListener('click', () => setFilter(f.id));
  filterStrip.appendChild(btn);
});

function setFilter(id) {
  currentFilter = id;
  const video = document.getElementById('video');
  const f = FILTERS.find(x => x.id === id);
  video.style.filter = f ? f.css : '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
}

// ---- CAMERA ----
async function startCamera(facing = 'user') {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.classList.toggle('mirror', facing === 'user');
    document.getElementById('no-cam').style.display = 'none';
  } catch(e) {
    document.getElementById('no-cam').style.display = 'flex';
  }
}

// ---- FLIP ----
document.getElementById('flip-btn').addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera(facingMode);
});

// ---- UPLOAD ----
document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('upload-input').click());
document.getElementById('upload-input').addEventListener('change', e => {
  const files = Array.from(e.target.files).slice(0, MAX_SHOTS - currentShot);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => addPhoto(ev.target.result);
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

// ---- CAPTURE FLOW ----
document.getElementById('capture-btn').addEventListener('click', () => {
  if (isCounting || currentShot >= MAX_SHOTS) return;
  if (document.getElementById('no-cam').style.display !== 'none' && !stream) return;
  startCountdown();
});

async function startCountdown() {
  isCounting = true;
  const el = document.getElementById('countdown');
  el.style.display = 'flex';
  for (let i = 3; i >= 1; i--) {
    el.textContent = i;
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'count-pop 0.8s ease';
    await wait(900);
  }
  el.style.display = 'none';
  captureFrame();
  isCounting = false;
}

function captureFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const W = 640, H = 480;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  // Mirror if front cam
  if (facingMode === 'user') { ctx.translate(W, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, 0, 0, W, H);
  if (facingMode === 'user') { ctx.setTransform(1,0,0,1,0,0); }
  // Apply filter via CSS filter on offscreen canvas (approximation)
  const f = FILTERS.find(x => x.id === currentFilter);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  addPhoto(dataUrl, currentFilter);
  flashEffect();
}

function addPhoto(dataUrl, filterId) {
  if (currentShot >= MAX_SHOTS) return;
  capturedPhotos.push({ dataUrl, filter: filterId || currentFilter });
  markDot(currentShot, 'done');
  currentShot++;
  if (currentShot < MAX_SHOTS) {
    markDot(currentShot, 'current');
    document.getElementById('seq-label').textContent = `Photo ${currentShot + 1} of ${MAX_SHOTS}`;
  } else {
    document.getElementById('seq-label').textContent = `All shots done! 🎉`;
    setTimeout(goToEditor, 800);
  }
}

function markDot(i, cls) {
  const dot = document.getElementById(`dot-${i}`);
  if (!dot) return;
  dot.className = 'seq-dot ' + cls;
}

function flashEffect() {
  const f = document.getElementById('flash');
  f.style.opacity = '0.8';
  setTimeout(() => { f.style.opacity = '0'; }, 150);
}

function goToEditor() {
  sessionStorage.setItem('snapstrip_photos', JSON.stringify(capturedPhotos));
  window.location.href = 'editor.html';
}

// ---- RANDOM FILTER ----
document.getElementById('random-btn').addEventListener('click', () => {
  const ids = FILTERS.map(f => f.id);
  const next = ids[Math.floor(Math.random() * ids.length)];
  setFilter(next);
  // Bounce animation
  const btn = document.getElementById('random-btn');
  btn.style.transform = 'scale(1.3) rotate(20deg)';
  setTimeout(() => { btn.style.transform = ''; btn.style.transition = 'transform 0.3s'; }, 200);
});

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- INIT ----
startCamera(facingMode);
</script>
</body>
</html>
