<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapStrip – Editor ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root { --pink:#FF6BB5; --purple:#A855F7; --yellow:#FFD93D; --cyan:#22D3EE; --bg:#0F0B1E; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:#fff; min-height:100dvh; overflow-x:hidden; display:flex; flex-direction:column; }
  body::before { content:''; position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 60% 50% at 20% 20%,rgba(168,85,247,0.2) 0%,transparent 60%), radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,107,181,0.15) 0%,transparent 60%); pointer-events:none; }

  .topbar { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:14px 20px; }
  .logo { font-family:'Paytone One',sans-serif; font-size:20px; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .back-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:#fff; padding:7px 14px; border-radius:100px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; }
  .next-btn { background:linear-gradient(135deg,var(--pink),var(--purple)); border:none; color:#fff; padding:9px 20px; border-radius:100px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; box-shadow:0 4px 16px rgba(168,85,247,0.4); transition:transform 0.15s; }
  .next-btn:active { transform:scale(0.93); }

  /* TABS */
  .tabs { position:relative; z-index:10; display:flex; gap:4px; padding:0 20px 12px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:8px 16px; border-radius:100px; border:1.5px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); cursor:pointer; font-size:13px; font-weight:700; color:rgba(255,255,255,0.6); transition:all 0.15s; }
  .tab.active { background:linear-gradient(135deg,var(--pink),var(--purple)); border-color:transparent; color:#fff; }

  /* CANVAS AREA */
  .canvas-area { position:relative; z-index:5; flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:8px; min-height:260px; }
  #strip-canvas { border-radius:16px; box-shadow:0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08); max-width:100%; max-height:360px; cursor:crosshair; touch-action:none; }

  /* LAYOUT BTNS */
  .layout-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .layout-row::-webkit-scrollbar { display:none; }
  .layout-btn { flex-shrink:0; padding:8px 16px; border-radius:12px; background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); font-size:13px; font-weight:700; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .layout-btn.active { background:rgba(255,107,181,0.2); border-color:var(--pink); color:var(--pink); }

  /* TOOL PANEL */
  .tool-panel { position:relative; z-index:10; background:rgba(15,11,30,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.08); padding:16px 20px 28px; }

  /* STICKERS */
  .sticker-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .sticker { width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:26px; cursor:pointer; transition:transform 0.15s; }
  .sticker:active { transform:scale(0.85); }

  /* TEXT TOOL */
  .text-tool { display:flex; flex-direction:column; gap:12px; }
  .text-tool input { background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.15); border-radius:12px; padding:12px 16px; color:#fff; font-family:'Nunito',sans-serif; font-size:15px; outline:none; width:100%; }
  .text-tool input::placeholder { color:rgba(255,255,255,0.35); }
  .font-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .font-btn { flex-shrink:0; padding:8px 14px; border-radius:10px; background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.12); color:#fff; font-size:14px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .font-btn.active { border-color:var(--pink); background:rgba(255,107,181,0.15); }
  .color-row { display:flex; gap:8px; }
  .color-dot { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform 0.15s; }
  .color-dot.active { border-color:#fff; transform:scale(1.2); }
  .add-text-btn { background:linear-gradient(135deg,var(--pink),var(--purple)); border:none; color:#fff; padding:12px; border-radius:12px; font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; cursor:pointer; }

  /* ADJUSTMENTS */
  .adjust-tool { display:flex; flex-direction:column; gap:14px; }
  .slider-row { display:flex; align-items:center; gap:12px; }
  .slider-label { font-size:13px; font-weight:700; color:rgba(255,255,255,0.7); width:80px; }
  input[type=range] { flex:1; -webkit-appearance:none; height:6px; border-radius:3px; background:rgba(255,255,255,0.15); outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:linear-gradient(135deg,var(--pink),var(--purple)); cursor:pointer; }
  .slider-val { font-size:12px; color:rgba(255,255,255,0.5); width:32px; text-align:right; }

  /* BG COLORS */
  .bg-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .bg-btn { flex-shrink:0; width:40px; height:40px; border-radius:12px; cursor:pointer; border:2.5px solid transparent; transition:transform 0.15s, border-color 0.15s; }
  .bg-btn.active { border-color:#fff; transform:scale(1.15); }

  /* Placed stickers on canvas */
  .placed-sticker { position:absolute; font-size:40px; cursor:move; user-select:none; touch-action:none; transition:transform 0.1s; z-index:50; }
  .placed-text { position:absolute; cursor:move; user-select:none; touch-action:none; z-index:51; white-space:nowrap; }

  .section-title { font-size:12px; font-weight:800; color:rgba(255,255,255,0.4); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Retake</button>
  <div class="logo">SnapStrip</div>
  <button class="next-btn" id="done-btn">Done →</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="layout">🎞️ Layout</div>
  <div class="tab" data-tab="stickers">🌸 Stickers</div>
  <div class="tab" data-tab="text">✏️ Text</div>
  <div class="tab" data-tab="adjust">🎨 Adjust</div>
</div>

<div class="canvas-area">
  <canvas id="strip-canvas"></canvas>
</div>

<div class="tool-panel" id="tool-panel">
  <!-- Layout panel -->
  <div id="panel-layout">
    <div class="section-title">Layout</div>
    <div class="layout-row">
      <div class="layout-btn active" data-layout="strip">🎞️ Strip</div>
      <div class="layout-btn" data-layout="grid">⊞ 2×2 Grid</div>
      <div class="layout-btn" data-layout="polaroid">📷 Polaroid</div>
      <div class="layout-btn" data-layout="single">🖼️ Single</div>
    </div>
    <div style="height:12px;"></div>
    <div class="section-title">Background</div>
    <div class="bg-row" id="bg-row"></div>
  </div>

  <!-- Stickers panel -->
  <div id="panel-stickers" style="display:none;">
    <div class="section-title">Tap to add stickers</div>
    <div class="sticker-grid" id="sticker-grid"></div>
  </div>

  <!-- Text panel -->
  <div id="panel-text" style="display:none;">
    <div class="text-tool">
      <input type="text" id="text-input" placeholder="Type something cute..." maxlength="40">
      <div class="font-row" id="font-row"></div>
      <div class="color-row" id="color-row"></div>
      <button class="add-text-btn" id="add-text-btn">✨ Add Text</button>
    </div>
  </div>

  <!-- Adjust panel -->
  <div id="panel-adjust" style="display:none;">
    <div class="adjust-tool">
      <div class="slider-row">
        <div class="slider-label">Brightness</div>
        <input type="range" id="sl-brightness" min="50" max="150" value="100">
        <div class="slider-val" id="val-brightness">100</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Contrast</div>
        <input type="range" id="sl-contrast" min="50" max="150" value="100">
        <div class="slider-val" id="val-contrast">100</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Saturation</div>
        <input type="range" id="sl-saturation" min="0" max="200" value="100">
        <div class="slider-val" id="val-saturation">100</div>
      </div>
    </div>
  </div>
</div>

<canvas id="export-canvas" style="display:none;"></canvas>

<script>
// ---- DATA ----
const photos = JSON.parse(sessionStorage.getItem('snapstrip_photos') || '[]');

const FILTERS_CSS = {
  none:'', kawaii:'brightness(1.1) saturate(1.4) contrast(0.9) hue-rotate(-15deg)',
  retro:'sepia(0.7) contrast(1.1) brightness(0.95)', bw:'grayscale(1)',
  dreamy:'brightness(1.15) saturate(1.2) contrast(0.9)', neon:'saturate(2) contrast(1.3) brightness(0.9) hue-rotate(20deg)',
  warm:'sepia(0.3) saturate(1.5) brightness(1.05) hue-rotate(-10deg)', cool:'saturate(0.8) hue-rotate(30deg) brightness(1.05)',
  lomo:'contrast(1.4) saturate(1.3) brightness(0.9) hue-rotate(10deg)', golden:'sepia(0.5) saturate(1.8) brightness(1.1) hue-rotate(-20deg)',
  matrix:'grayscale(1) sepia(1) hue-rotate(90deg) saturate(3) brightness(0.9)', pop:'saturate(2.5) contrast(1.2) brightness(1.05)',
};

const STICKERS = ['🌸','💖','⭐','✨','🔥','💫','🌈','🎀','💕','🦋','🌺','💎','🤍','🎊','🥰','😍','🌙','☁️','🍀','🎵','🎶','🍓','🧁','🌻'];
const FONTS = [
  { name:'Nunito', label:'Cute' },
  { name:'Paytone One', label:'Bold' },
  { name:'Dancing Script', label:'Script' },
  { name:'Permanent Marker', label:'Marker' },
];
const TEXT_COLORS = ['#FFFFFF','#FF6BB5','#FFD93D','#22D3EE','#4ADE80','#A855F7','#FF4444','#000000'];
const BG_COLORS = [
  { color:'#FFFFFF', label:'White' },
  { color:'#F8E8FF', label:'Pastel' },
  { color:'#FFF0F5', label:'Rose' },
  { color:'#E8F4FF', label:'Blue' },
  { color:'#FFF8E8', label:'Cream' },
  { color:'#0F0B1E', label:'Dark' },
  { color:'linear-gradient(135deg,#FF6BB5,#A855F7)', label:'Gradient' },
  { color:'linear-gradient(135deg,#FFD93D,#FF6BB5)', label:'Sunset' },
];

let currentLayout = 'strip';
let currentBg = '#FFFFFF';
let currentFont = 'Nunito';
let currentTextColor = '#FFFFFF';
let adjustments = { brightness:100, contrast:100, saturation:100 };
let placedItems = []; // {type:'sticker'|'text', content, x, y, font, color, size}

// ---- INIT ----
const canvas = document.getElementById('strip-canvas');
const ctx = canvas.getContext('2d');
let loadedImages = [];

async function loadImages() {
  loadedImages = await Promise.all(photos.map(p => new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = p.dataUrl;
  })));
  renderCanvas();
}

// ---- RENDER ----
function renderCanvas() {
  const layout = currentLayout;
  let W, H;
  if (layout === 'strip') { W = 320; H = 1040; }
  else if (layout === 'grid') { W = 640; H = 640; }
  else if (layout === 'polaroid') { W = 360; H = 460; }
  else { W = 640; H = 480; }

  canvas.width = W; canvas.height = H;

  // Background
  if (currentBg.startsWith('linear')) {
    const g = parseBgGradient(currentBg, W, H);
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = currentBg;
  }
  ctx.fillRect(0, 0, W, H);

  const imgs = loadedImages.length ? loadedImages : [];
  const filter = adjustments;
  ctx.filter = `brightness(${filter.brightness}%) contrast(${filter.contrast}%) saturate(${filter.saturation}%)`;

  if (layout === 'strip') renderStrip(W, H, imgs);
  else if (layout === 'grid') renderGrid(W, H, imgs);
  else if (layout === 'polaroid') renderPolaroid(W, H, imgs);
  else renderSingle(W, H, imgs);

  ctx.filter = 'none';

  // Placed items
  placedItems.forEach(item => {
    if (item.type === 'sticker') {
      ctx.font = `${item.size || 50}px serif`;
      ctx.textBaseline = 'middle';
      ctx.fillText(item.content, item.x, item.y);
    } else if (item.type === 'text') {
      ctx.font = `bold ${item.size || 28}px '${item.font}'`;
      ctx.fillStyle = item.color;
      ctx.textBaseline = 'middle';
      ctx.fillText(item.content, item.x, item.y);
    }
  });

  // Watermark
  ctx.filter = 'none';
  ctx.font = '13px Nunito';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'center';
  ctx.fillText('snapstrip.app', W / 2, H - 10);
  ctx.textAlign = 'left';

  // Fit on screen
  const maxW = window.innerWidth - 40;
  const maxH = 360;
  const ratio = Math.min(maxW / W, maxH / H);
  canvas.style.width = Math.round(W * ratio) + 'px';
  canvas.style.height = Math.round(H * ratio) + 'px';
}

function parseBgGradient(css, W, H) {
  const g = ctx.createLinearGradient(0, 0, W, H);
  if (css.includes('#FF6BB5')) { g.addColorStop(0,'#FF6BB5'); g.addColorStop(1,'#A855F7'); }
  else { g.addColorStop(0,'#FFD93D'); g.addColorStop(1,'#FF6BB5'); }
  return g;
}

function renderStrip(W, H, imgs) {
  const PAD = 12, GAP = 10;
  const imgH = Math.floor((H - PAD*2 - GAP*3) / 4);
  const imgW = W - PAD*2;
  for (let i = 0; i < 4; i++) {
    const x = PAD, y = PAD + i * (imgH + GAP);
    roundRect(ctx, x, y, imgW, imgH, 10);
    ctx.clip();
    if (imgs[i]) {
      const f = photos[i]?.filter;
      if (f && FILTERS_CSS[f]) { ctx.save(); ctx.filter = FILTERS_CSS[f]; }
      drawCover(imgs[i], x, y, imgW, imgH);
      if (f && FILTERS_CSS[f]) ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x, y, imgW, imgH);
    }
    ctx.restore && ctx.restore();
    roundRect(ctx, x, y, imgW, imgH, 10);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function renderGrid(W, H, imgs) {
  const PAD = 16, GAP = 10;
  const cellW = (W - PAD*2 - GAP) / 2;
  const cellH = (H - PAD*2 - GAP) / 2;
  for (let i = 0; i < 4; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    const x = PAD + col*(cellW+GAP), y = PAD + row*(cellH+GAP);
    roundRect(ctx, x, y, cellW, cellH, 12);
    ctx.clip();
    if (imgs[i]) {
      const f = photos[i]?.filter;
      if (f && FILTERS_CSS[f]) { ctx.save(); ctx.filter = FILTERS_CSS[f]; }
      drawCover(imgs[i], x, y, cellW, cellH);
      if (f && FILTERS_CSS[f]) ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(x, y, cellW, cellH);
    }
    roundRect(ctx, x, y, cellW, cellH, 12);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

function renderPolaroid(W, H, imgs) {
  const PAD = 20, BOTTOM = 70;
  const imgW = W - PAD*2, imgH = H - PAD - BOTTOM - 10;
  roundRect(ctx, 0, 0, W, H, 0);
  ctx.clip();
  if (imgs[0]) {
    const f = photos[0]?.filter;
    if (f && FILTERS_CSS[f]) { ctx.save(); ctx.filter = FILTERS_CSS[f]; }
    drawCover(imgs[0], PAD, PAD, imgW, imgH);
    if (f && FILTERS_CSS[f]) ctx.restore();
  }
  // White bottom
  ctx.fillStyle = currentBg === '#0F0B1E' ? '#1a1a2e' : '#fff';
  ctx.fillRect(0, H - BOTTOM, W, BOTTOM);
  ctx.fillStyle = currentBg === '#0F0B1E' ? '#ccc' : '#555';
  ctx.font = `bold 18px 'Nunito'`;
  ctx.textAlign = 'center';
  ctx.fillText('SnapStrip ✨', W/2, H - BOTTOM + 38);
  ctx.textAlign = 'left';
}

function renderSingle(W, H, imgs) {
  const PAD = 16;
  roundRect(ctx, PAD, PAD, W-PAD*2, H-PAD*2, 16);
  ctx.clip();
  if (imgs[0]) {
    const f = photos[0]?.filter;
    if (f && FILTERS_CSS[f]) { ctx.save(); ctx.filter = FILTERS_CSS[f]; }
    drawCover(imgs[0], PAD, PAD, W-PAD*2, H-PAD*2);
    if (f && FILTERS_CSS[f]) ctx.restore();
  }
}

function drawCover(img, x, y, w, h) {
  ctx.save();
  const ir = img.width / img.height;
  const cr = w / h;
  let sx, sy, sw, sh;
  if (ir > cr) { sh = img.height; sw = sh * cr; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / cr; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ---- TABS ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    ['layout','stickers','text','adjust'].forEach(p => {
      document.getElementById(`panel-${p}`).style.display = p === tab.dataset.tab ? 'block' : 'none';
    });
  });
});

// ---- LAYOUT BTNS ----
document.querySelectorAll('.layout-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLayout = btn.dataset.layout;
    renderCanvas();
  });
});

// ---- BG ----
const bgRow = document.getElementById('bg-row');
BG_COLORS.forEach((bg, i) => {
  const btn = document.createElement('div');
  btn.className = 'bg-btn' + (i === 0 ? ' active' : '');
  btn.style.background = bg.color;
  btn.title = bg.label;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBg = bg.color;
    renderCanvas();
  });
  bgRow.appendChild(btn);
});

// ---- STICKERS ----
const stickerGrid = document.getElementById('sticker-grid');
STICKERS.forEach(s => {
  const el = document.createElement('div');
  el.className = 'sticker';
  el.textContent = s;
  el.addEventListener('click', () => {
    placedItems.push({ type:'sticker', content:s, x: canvas.width/2, y: canvas.height/2, size:50 });
    renderCanvas();
  });
  stickerGrid.appendChild(el);
});

// ---- FONTS ----
const fontRow = document.getElementById('font-row');
FONTS.forEach(f => {
  const btn = document.createElement('div');
  btn.className = 'font-btn' + (f.name === 'Nunito' ? ' active' : '');
  btn.textContent = f.label;
  btn.style.fontFamily = f.name;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFont = f.name;
  });
  fontRow.appendChild(btn);
});

// ---- TEXT COLORS ----
const colorRow = document.getElementById('color-row');
TEXT_COLORS.forEach((c, i) => {
  const dot = document.createElement('div');
  dot.className = 'color-dot' + (i === 0 ? ' active' : '');
  dot.style.background = c;
  if (c === '#000000') dot.style.border = '2px solid rgba(255,255,255,0.3)';
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentTextColor = c;
  });
  colorRow.appendChild(dot);
});

// ---- ADD TEXT ----
document.getElementById('add-text-btn').addEventListener('click', () => {
  const txt = document.getElementById('text-input').value.trim();
  if (!txt) return;
  placedItems.push({ type:'text', content:txt, x:canvas.width/2, y:canvas.height/2, font:currentFont, color:currentTextColor, size:32 });
  renderCanvas();
  document.getElementById('text-input').value = '';
});

// ---- ADJUSTMENTS ----
['brightness','contrast','saturation'].forEach(id => {
  const sl = document.getElementById(`sl-${id}`);
  const val = document.getElementById(`val-${id}`);
  sl.addEventListener('input', () => {
    adjustments[id] = parseInt(sl.value);
    val.textContent = sl.value;
    renderCanvas();
  });
});

// ---- DONE ----
document.getElementById('done-btn').addEventListener('click', () => {
  // Export full-res canvas
  const ec = document.getElementById('export-canvas');
  ec.width = canvas.width; ec.height = canvas.height;
  const ectx = ec.getContext('2d');
  ectx.drawImage(canvas, 0, 0);
  const dataUrl = ec.toDataURL('image/jpeg', 0.92);
  sessionStorage.setItem('snapstrip_result', dataUrl);
  window.location.href = 'download.html';
});

// ---- CANVAS TAP (drag stickers roughly) ----
canvas.addEventListener('click', e => {
  // If sticker/text tab: click moves last placed item to tap position
  const activeTab = document.querySelector('.tab.active')?.dataset?.tab;
  if ((activeTab === 'stickers' || activeTab === 'text') && placedItems.length > 0) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    placedItems[placedItems.length - 1].x = x;
    placedItems[placedItems.length - 1].y = y;
    renderCanvas();
  }
});

// ---- INIT ----
loadImages();
if (!photos.length) {
  // Demo mode: show placeholder
  renderCanvas();
}
</script>
